<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aiMET — Gasto energético</title>
<style>
  :root{
    --ink:#0E2B2D;        /* petrol ink */
    --paper:#F5F4F0;      /* lab paper */
    --teal:#1F6F6B;       /* spirometer teal */
    --teal-d:#16504D;
    --amber:#E8923A;      /* combustion amber */
    --amber-d:#C9742155;
    --slate:#6B7C7A;      /* muted */
    --line:#DAD7CE;
    --card:#FFFFFF;
    --danger:#B5462E;
    --r:14px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);color:var(--ink);font-family:var(--sans);
    line-height:1.5;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(var(--line) 1px,transparent 1px);
    background-size:22px 22px;background-position:-11px -11px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:28px 18px 80px}
  /* header */
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{font-size:30px;letter-spacing:-.03em;margin:0;font-weight:800}
  .brand h1 b{color:var(--teal)}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 4px var(--amber-d);align-self:center}
  .tag{color:var(--slate);font-size:13px;margin:2px 0 22px;letter-spacing:.02em}
  /* segmented controls */
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
  .seg button{border:0;background:transparent;color:var(--slate);font:inherit;font-size:13px;font-weight:600;
    padding:6px 13px;border-radius:999px;cursor:pointer;transition:background .15s,color .15s}
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff}
  .seg.lang button[aria-pressed="true"]{background:var(--teal);color:#fff}
  .modes{margin:0 0 18px}
  .modes .seg{display:flex;width:100%;justify-content:stretch}
  .modes .seg button{flex:1;padding:10px 6px;font-size:14px}
  .unitbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 14px}
  .unitbar .unit-label{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--slate)}
  .unitbar .seg button{min-width:86px}
  /* card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;
    box-shadow:0 1px 0 rgba(14,43,45,.04),0 10px 30px -22px rgba(14,43,45,.45)}
  .field{position:relative;margin-bottom:14px}
  label{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
  input,select{width:100%;font:inherit;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink)}
  input[type=number]{font-family:var(--mono)}
  input:focus,select:focus,button:focus-visible{outline:2.5px solid var(--teal);outline-offset:2px}
  .row{display:flex;gap:12px}
  .row>*{flex:1}
  /* autocomplete */
  .ac{position:absolute;z-index:20;left:0;right:0;top:calc(100% + 4px);background:var(--card);
    border:1px solid var(--line);border-radius:10px;max-height:280px;overflow:auto;
    box-shadow:0 16px 40px -16px rgba(14,43,45,.5);display:none}
  .ac.open{display:block}
  .ac .opt{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--paper)}
  .ac .opt:last-child{border-bottom:0}
  .ac .opt:hover,.ac .opt.hi{background:var(--paper)}
  .ac .opt .nm{font-size:14px}
  .ac .opt .meta{font-size:11px;color:var(--slate);margin-top:1px;font-family:var(--mono)}
  .ac .opt .en{color:var(--slate);font-style:italic;font-size:12px}
  .ac .empty{padding:14px 12px;color:var(--slate);font-size:13px}
  .picked{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px dashed var(--teal);
    border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:14px}
  .picked .met{margin-left:auto;font-family:var(--mono);font-weight:700;color:var(--teal);white-space:nowrap}
  .picked .en{display:block;color:var(--slate);font-style:italic;font-size:12px;margin-top:2px}
  .cta{width:100%;border:0;background:var(--teal);color:#fff;font:inherit;font-weight:700;font-size:15px;
    padding:13px;border-radius:11px;cursor:pointer;transition:background .15s}
  .cta:hover{background:var(--teal-d)}
  .cta:disabled{background:var(--slate);opacity:.5;cursor:not-allowed}
  .opts{display:flex;align-items:center;gap:8px;margin:2px 0 14px;font-size:13px;color:var(--slate)}
  .opts input{width:auto}
  /* dial */
  .dial-wrap{display:flex;flex-direction:column;align-items:center;margin:26px 0 8px}
  .dial{position:relative;width:230px;height:230px}
  .dial svg{transform:rotate(-90deg)}
  .dial .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .dial .kcal{font-family:var(--mono);font-size:46px;font-weight:700;line-height:1;letter-spacing:-.02em}
  .dial .unit{font-size:13px;color:var(--slate);letter-spacing:.18em;text-transform:uppercase;margin-top:6px}
  .flame{transform-origin:center;animation:flick 2.6s ease-in-out infinite}
  @keyframes flick{0%,100%{opacity:.85}50%{opacity:1}}
  /* session */
  .session{margin-top:20px}
  .session h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);margin:0 0 10px}
  .item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .item:first-of-type{border-top:1px solid var(--line)}
  .item .info{min-width:0}
  .item .nm{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .sub{font-size:11px;color:var(--slate);font-family:var(--mono)}
  .item .kc{margin-left:auto;font-family:var(--mono);font-weight:700;white-space:nowrap}
  .item .rm{border:0;background:transparent;color:var(--danger);cursor:pointer;font-size:18px;line-height:1;padding:4px 6px;border-radius:8px}
  .item .rm:hover{background:#B5462E18}
  .total{display:flex;align-items:baseline;gap:10px;margin-top:14px;padding-top:6px}
  .total .lbl{font-weight:800;letter-spacing:-.01em}
  .total .val{margin-left:auto;font-family:var(--mono);font-size:24px;font-weight:700;color:var(--amber)}
  .empty-s{color:var(--slate);font-size:13px;font-style:italic;padding:6px 0}
  .tools{margin-top:20px}
  .tool-toggle{width:100%;border:1px solid var(--line);background:var(--card);color:var(--ink);font:inherit;
    font-weight:800;padding:12px 14px;border-radius:11px;cursor:pointer;text-align:left}
  .tool-toggle[aria-expanded="true"]{border-color:var(--teal);box-shadow:0 0 0 2px #1F6F6B18}
  .tool-panel{display:none;margin-top:12px}
  .tool-panel.open{display:block}
  .result{display:flex;align-items:baseline;gap:10px;background:var(--paper);border:1px solid var(--line);
    border-radius:10px;padding:12px;margin:2px 0 14px}
  .result .lbl{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--slate)}
  .result .val{margin-left:auto;font-family:var(--mono);font-size:22px;font-weight:800;color:var(--teal)}
  .secondary{width:100%;border:1px solid var(--teal);background:var(--card);color:var(--teal);font:inherit;
    font-weight:800;padding:12px;border-radius:11px;cursor:pointer}
  .secondary:hover{background:#1F6F6B10}
  footer{margin-top:34px;color:var(--slate);font-size:11.5px;line-height:1.6}
  footer a{color:var(--teal)}
  .hint{font-size:11px;color:var(--slate);margin-top:4px;font-family:var(--mono)}
  @media (max-width:540px){
    .brand h1{font-size:25px}.dial{width:200px;height:200px}.dial .kcal{font-size:40px}
    .row{flex-direction:column;gap:0}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="dot"></span><h1>ai<b>MET</b></h1></div>
    <div class="seg lang" role="group" aria-label="Language">
      <button data-lang="en" aria-pressed="false">EN</button>
      <button data-lang="pt" aria-pressed="true">PT</button>
      <button data-lang="es" aria-pressed="false">ES</button>
    </div>
  </header>
  <p class="tag" id="tagline"></p>

  <div class="modes">
    <div class="seg" role="group" aria-label="Population" id="modeSeg">
      <button data-mode="adult" aria-pressed="true"></button>
      <button data-mode="older" aria-pressed="false"></button>
      <button data-mode="youth" aria-pressed="false"></button>
    </div>
  </div>

  <div class="unitbar">
    <span class="unit-label" id="lblUnits"></span>
    <div class="seg" role="group" aria-label="Units" id="unitSeg">
      <button data-units="metric" aria-pressed="true"></button>
      <button data-units="imperial" aria-pressed="false"></button>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label id="lblSearch"></label>
      <input type="text" id="search" autocomplete="off" spellcheck="false">
      <div class="ac" id="ac"></div>
    </div>

    <div id="picked" style="display:none" class="picked"></div>

    <div class="row" id="youthRow" style="display:none">
      <div class="field"><label id="lblSex"></label>
        <select id="sex"><option value="M"></option><option value="F"></option></select></div>
      <div class="field"><label id="lblAge"></label>
        <select id="band">
          <option value="6-9">6–9</option><option value="10-12">10–12</option>
          <option value="13-15">13–15</option><option value="16-18">16–18</option>
        </select></div>
    </div>

    <div class="row">
      <div class="field"><label id="lblWeight"></label>
        <input type="number" id="weight" min="1" step="0.5" inputmode="decimal" value="70">
        <div class="hint" id="hintBMR"></div></div>
      <div class="field"><label id="lblDur"></label>
        <input type="number" id="dur" min="1" step="1" inputmode="numeric" value="30"></div>
    </div>

    <div class="opts">
      <input type="checkbox" id="net"><label for="net" id="lblNet" style="text-transform:none;letter-spacing:0;font-weight:600;color:var(--slate);margin:0"></label>
    </div>

    <button class="cta" id="add" disabled></button>
  </div>

  <div class="dial-wrap">
    <div class="dial">
      <svg width="230" height="230" viewBox="0 0 230 230" aria-hidden="true">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#E8923A"/><stop offset="60%" stop-color="#1F6F6B"/>
            <stop offset="100%" stop-color="#16504D"/>
          </linearGradient>
        </defs>
        <circle cx="115" cy="115" r="100" fill="none" stroke="#DAD7CE" stroke-width="16"/>
        <circle id="arc" class="flame" cx="115" cy="115" r="100" fill="none" stroke="url(#g)"
          stroke-width="16" stroke-linecap="round" stroke-dasharray="628" stroke-dashoffset="628"
          style="transition:stroke-dashoffset .7s cubic-bezier(.3,.8,.3,1)"/>
      </svg>
      <div class="center"><span class="kcal" id="kcalBig">0</span><span class="unit">kcal</span></div>
    </div>
  </div>

  <div class="session">
    <h2 id="lblSession"></h2>
    <div id="items"><p class="empty-s" id="emptyS"></p></div>
    <div class="total" id="totalRow" style="display:none">
      <span class="lbl" id="lblTotal"></span><span class="val" id="totalVal">0 kcal</span>
    </div>
  </div>

  <div class="tools">
    <button class="tool-toggle" id="eaToggle" type="button" aria-expanded="false"></button>
    <div class="tool-panel card" id="eaPanel">
      <div class="unitbar">
        <span class="unit-label" id="lblEaMode"></span>
        <div class="seg" role="group" aria-label="Energy availability mode" id="eaModeSeg">
          <button data-ea-mode="day" aria-pressed="true"></button>
          <button data-ea-mode="week" aria-pressed="false"></button>
        </div>
      </div>
      <div class="row">
        <div class="field"><label id="lblEnergyIntake"></label>
          <input type="number" id="energyIntake" min="0" step="1" inputmode="numeric"></div>
        <div class="field"><label id="lblFfm"></label>
          <input type="number" id="ffm" min="1" step="0.1" inputmode="decimal"></div>
      </div>
      <div class="result">
        <span class="lbl" id="lblEaResult"></span><span class="val" id="eaResult">—</span>
      </div>
      <div class="field"><label id="lblFileName"></label>
        <input type="text" id="fileName" value="aiMET"></div>
      <button class="secondary" id="saveExcel" type="button"></button>
    </div>
  </div>

  <footer id="foot"></footer>
</div>

<script>
const DATA = {"meta":{"source":"2024 Adult & Older Adult Compendium of Physical Activities (pacompendium.com); Youth Compendium (Butte et al. 2018, NCCOR)","note":"PT/ES are assisted translations derived from the English originals; English is authoritative."},"adult":[{"code":"01003","cat":"Bicycling","met":14,"name":{"en":"Bicycling, mountain, uphill, vigorous","pt":"Ciclismo de montanha, subida, vigoroso","es":"Ciclismo, montaña, cuesta arriba, vigoroso"}},{"code":"01004","cat":"Bicycling","met":16,"name":{"en":"Bicycling, mountain, competitive racing","pt":"Ciclismo de montanha, corrida competitiva","es":"Ciclismo, montaña, competitivo carreras"}},{"code":"01008","cat":"Bicycling","met":8.5,"name":{"en":"Bicycling, BMX","pt":"Ciclismo, BMX","es":"Ciclismo, BMX"}},{"code":"01009","cat":"Bicycling","met":8.5,"name":{"en":"Bicycling, mountain, general","pt":"Ciclismo de montanha, geral","es":"Ciclismo, montaña, general"}},{"code":"01010","cat":"Bicycling","met":4,"name":{"en":"Bicycling, <10 mph, leisure, to work or for pleasure (Taylor Code 115)","pt":"Ciclismo, <10 mph, lazer, deslocamento ao trabalho ou passeio (Código Taylor 115)","es":"Ciclismo, <10 mph, ocio, al trabajo o por placer (Código Taylor 115)"}},{"code":"01011","cat":"Bicycling","met":6.8,"name":{"en":"Bicycling, to/from work, self selected pace","pt":"Ciclismo, ida/volta do trabalho, ritmo autosselecionado","es":"Ciclismo, ida y vuelta al trabajo, ritmo autoseleccionado"}},{"code":"01013","cat":"Bicycling","met":5.8,"name":{"en":"Bicycling, on dirt or farm road, moderate pace","pt":"Ciclismo em estrada de terra ou estrada rural, ritmo moderado","es":"Ciclismo, en tierra o granja carretera, ritmo moderado"}},{"code":"01014","cat":"Bicycling","met":7,"name":{"en":"Bicycling, general","pt":"Ciclismo, geral","es":"Ciclismo, general"}},{"code":"01015","cat":"Bicycling","met":4.3,"name":{"en":"Bicycling, self-selected easy pace","pt":"Ciclismo, ritmo leve autosselecionado","es":"Ciclismo, ritmo fácil autoseleccionado"}},{"code":"01016","cat":"Bicycling","met":7,"name":{"en":"Bicycling, self-selected moderate pace","pt":"Ciclismo, ritmo moderado autosselecionado","es":"Ciclismo, ritmo moderado autoseleccionado"}},{"code":"01017","cat":"Bicycling","met":9,"name":{"en":"Bicycling, self-selected vigorous pace","pt":"Ciclismo, ritmo vigoroso autosselecionado","es":"Ciclismo, ritmo vigoroso autoseleccionado"}},{"code":"01018","cat":"Bicycling","met":3.5,"name":{"en":"Bicycling, leisure 5.5 mph","pt":"Ciclismo, lazer 5.5 mph","es":"Ciclismo, ocio 5.5 mph"}},{"code":"01019","cat":"Bicycling","met":5.8,"name":{"en":"Bicycling, leisure, 9.4 mph","pt":"Ciclismo, lazer, 9.4 mph","es":"Ciclismo, ocio, 9.4 mph"}},{"code":"01020","cat":"Bicycling","met":6.8,"name":{"en":"Bicycling, 10-11.9 mph, leisure, slow, light effort","pt":"Ciclismo, 10-11.9 mph, lazer, lento, esforço leve","es":"Ciclismo, 10-11.9 mph, ocio, lento, esfuerzo leve"}},{"code":"01030","cat":"Bicycling","met":8,"name":{"en":"Bicycling, 12-13.9 mph, leisure, moderate effort","pt":"Ciclismo, 12-13.9 mph, lazer, esforço moderado","es":"Ciclismo, 12-13.9 mph, ocio, esfuerzo moderado"}},{"code":"01040","cat":"Bicycling","met":10,"name":{"en":"Bicycling, 14-15.9 mph, racing or leisure, fast, vigorous effort","pt":"Ciclismo, 14-15,9 mph, corrida ou lazer, rápido, esforço vigoroso","es":"Ciclismo, 14-15.9 mph, carreras o ocio, rápido, esfuerzo vigoroso"}},{"code":"01050","cat":"Bicycling","met":12,"name":{"en":"Bicycling, 16-19 mph, racing/not drafting or >19 mph drafting, very fast, racing general","pt":"Ciclismo, 16-19 mph, competição sem vácuo ou >19 mph no vácuo, muito rápido, corrida geral","es":"Ciclismo, 16-19 mph, racing/sin rebufo o >19 mph rebufo, muy rápido, carreras general"}},{"code":"01060","cat":"Bicycling","met":16.8,"name":{"en":"Bicycling, >20 mph, racing, not drafting","pt":"Ciclismo, >20 mph, competição, sem vácuo","es":"Ciclismo, >20 mph, carreras, sin rebufo"}},{"code":"01065","cat":"Bicycling","met"       foot:'Adulto: kcal = MET × 3,5 × kg ÷ 200 · Idoso (60+): o MET₆₀ usa linha de base de 2,7 ml/kg/min · Jovem: kcal = MET<sub>y</sub> × TMB de Schofield × min. Fontes: Compêndio de Adultos e Idosos 2024 (pacompendium.com) e Compêndio Jovem (Butte et al., 2018; nccor.org). Apenas estimativas — não é orientação médica.'},
  es:{tag:"Gasto energético · Compendio de Actividades Físicas",
      modes:{adult:"Adulto",older:"Mayor 60+",youth:"Joven 6–18"},
      units:"Unidades", metric:"Métrico", imperial:"Imperial",
      search:"Escribe una actividad", sex:"Sexo", age:"Edad (años)", weightMetric:"Peso corporal (kg)", weightImperial:"Peso corporal (lb)",
      dur:"Duración (minutos)", net:"Restar gasto en reposo (neto)",
      add:"Añadir a la sesión", session:"Sesión", total:"Total", empty:"Aún no hay actividades — busca y añade una.",
      eaToggle:"Calcular disponibilidad energética (DE)", energyIntake:"Ingesta de energía (kcal)", ffm:"Masa libre de grasa (kg)",
      eaMode:"Modo de DE", eaDay:"Día anterior", eaWeek:"Promedio semanal",
      eaResult:"DE", fileName:"Nombre del archivo", saveExcel:"Guardar en Excel", sheetSummary:"Resumen", sheetActivities:"Actividades",
      exerciseEnergy:"Gasto usado en DE", weeklyExercise:"Gasto semanal registrado", eaUnit:"kcal/kg MLG",
      male:"Masculino", female:"Femenino", perMin:"kcal/min", remove:"Quitar",
      bmr:"TMB de Schofield", metLbl:"MET",
      foot:'Adulto: kcal = MET × 3,5 × kg ÷ 200 · Mayor (60+): el MET₆₀ usa una base de 2,7 ml/kg/min · Joven: kcal = MET<sub>y</sub> × TMB de Schofield × min. Fuentes: Compendio de Adultos y Mayores 2024 (pacompendium.com) y Compendio Joven (Butte et al., 2018; nccor.org). Solo estimaciones — no es consejo médico.'}
};

let lang='pt', mode='adult', units='metric', eaMode='day', picked=null;
const session=[];

/* ------------- helpers ------------- */
const $=id=>document.getElementById(id);
function norm(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();}
function list(){return DATA[mode];}
function catName(c){const o=DATA.categories[c];return o?o[lang]:c;}
function weightKg(){
  const w=parseFloat($('weight').value)||0;
  return units==='imperial'?w/2.20462:w;
}
function fmt(n){
  const s=n.toFixed(1).replace(/\.0$/,'');
  return lang==='en'?s:s.replace('.',',');
}
function inputFmt(n){return n.toFixed(1).replace(/\.0$/,'');}
function num(s){return parseFloat(String(s).replace(',','.'));}
function localizeDecimals(s){return lang==='en'?s:s.replace(/(\d+)\.(\d+)/g,'$1,$2');}
function replaceRangeUnit(text, unitPattern, factor, unitLabel){
  const n='\\d+(?:[,.]\\d+)?';
  const re=new RegExp(`([<>≥≤~]?\\s*)(${n})(\\s*(?:-|–|a|to)\\s*(${n}))?\\s*${unitPattern}`,'gi');
  return text.replace(re,(_,pre,a,range,b)=>{
    const left=fmt(num(a)*factor);
    const sep=range?(range.includes('a')&&!range.includes('to')?' a ':'-'):'';
    const right=b?fmt(num(b)*factor):'';
    return `${pre||''}${left}${sep}${right} ${unitLabel}`;
  });
}
function metricName(raw){
  let s=raw;
  const hadMph=/\bmph\b/i.test(raw);
  s=s.replace(/([<>≥≤~]?\s*\d+(?:[,.]\d+)?(?:\s*(?:-|–|a|to)\s*\d+(?:[,.]\d+)?)?\s*mph)\s*\(([^)]*\bkm\/h)\)/gi,'$2');
  s=s.replace(/(\d+(?:[,.]\d+)?)\s*min\/mile\b/gi,(_,v)=>`${fmt(num(v)/1.60934)} min/km`);
  s=replaceRangeUnit(s,'mph',1.60934,'km/h');
  if(hadMph)s=s.replace(/\s*\([^)]*\bkm\/h[^)]*\)/gi,'');
  s=replaceRangeUnit(s,'(?:inches|inch|polegadas?|pulgadas?)',2.54,'cm');
  s=replaceRangeUnit(s,'(?:lb|lbs)\\/(?:minuto|minute|min)',0.453592,'kg/min');
  s=replaceRangeUnit(s,'(?:lb|lbs)(?!\\s*\\/)',0.453592,'kg');
  s=replaceRangeUnit(s,'(?:yards?|jardas?|yardas?)\\/(?:minuto|minute|min)',0.9144,'m/min');
  return localizeDecimals(s);
}
function activityName(item, l=lang){
  const raw=item.name[l]||item.name.en;
  return units==='metric'?metricName(raw):raw;
}

function schofield(sex,band,kg){
  const young = band==='6-9';
  let a,b;
  if(sex==='M'){a=young?22.706:17.686; b=young?504.3:658.2;}
  else        {a=young?20.315:13.384; b=young?485.9:692.6;}
  return (a*kg+b)/1440; // kcal/min
}
function kcalPerMin(item){
  const kg=weightKg();
  const net=$('net').checked;
  if(mode==='youth'){
    let m=item.mety[$('band').value]; if(net) m=Math.max(m-1,0);
    return m*schofield($('sex').value,$('band').value,kg);
  }
  let m=item.met; if(net) m=Math.max(m-1,0);
  const base = mode==='older'?2.7:3.5;
  return m*base*kg/200;
}
function metOf(item){return mode==='youth'?item.mety[$('band').value]:item.met;}

/* ------------- render UI text ------------- */
function applyLang(){
  const t=T[lang];
  document.documentElement.lang=lang;
  $('tagline').textContent=t.tag;
  $('modeSeg').querySelector('[data-mode=adult]').textContent=t.modes.adult;
  $('modeSeg').querySelector('[data-mode=older]').textContent=t.modes.older;
  $('modeSeg').querySelector('[data-mode=youth]').textContent=t.modes.youth;
  $('lblUnits').textContent=t.units;
  $('unitSeg').querySelector('[data-units=metric]').textContent=t.metric;
  $('unitSeg').querySelector('[data-units=imperial]').textContent=t.imperial;
  $('lblSearch').textContent=t.search;
  $('search').placeholder=t.search+'…';
  $('lblSex').textContent=t.sex; $('lblAge').textContent=t.age;
  $('lblWeight').textContent=units==='imperial'?t.weightImperial:t.weightMetric; $('lblDur').textContent=t.dur;
  $('lblNet').textContent=t.net; $('add').textContent=t.add;
  $('lblSession').textContent=t.session; $('lblTotal').textContent=t.total;
  $('eaToggle').textContent=t.eaToggle;
  $('lblEaMode').textContent=t.eaMode;
  $('eaModeSeg').querySelector('[data-ea-mode=day]').textContent=t.eaDay;
  $('eaModeSeg').querySelector('[data-ea-mode=week]').textContent=t.eaWeek;
  $('lblEnergyIntake').textContent=t.energyIntake; $('lblFfm').textContent=t.ffm;
  $('lblEaResult').textContent=t.eaResult; $('lblFileName').textContent=t.fileName;
  $('saveExcel').textContent=t.saveExcel;
  $('sex').options[0].textContent=t.male; $('sex').options[1].textContent=t.female;
  $('foot').innerHTML=t.foot;
  $('hintBMR').textContent='';
  if(picked) renderPicked();
  renderItems();
  updateEA();
  updateBMRhint();
}
function updateBMRhint(){
  if(mode!=='youth'){$('hintBMR').textContent='';return;}
  const kg=weightKg();
  const b=schofield($('sex').value,$('band').value,kg);
  $('hintBMR').textContent=T[lang].bmr+': '+b.toFixed(3)+' kcal/min';
}

/* ------------- search / autocomplete ------------- */
let acItems=[],hi=-1;
function runSearch(){
  const q=norm($('search').value.trim());
  const ac=$('ac');
  if(!q){ac.classList.remove('open');ac.innerHTML='';acItems=[];return;}
  const arr=list();
  const res=[];
  for(const it of arr){
    const nm=activityName(it), en=activityName(it,'en');
    if(norm(nm).includes(q)||norm(en).includes(q)||norm(it.name[lang]).includes(q)||norm(it.name.en).includes(q)){res.push(it);if(res.length>=40)break;}
  }
  acItems=res;hi=-1;
  if(!res.length){ac.innerHTML='<div class="empty">—</div>';ac.classList.add('open');return;}
  ac.innerHTML=res.map((it,i)=>{
    const nm=activityName(it), en=activityName(it,'en');
    const showEn = lang!=='en' && en.toLowerCase()!==nm.toLowerCase();
    return `<div class="opt" data-i="${i}">
      <div class="nm">${esc(nm)}</div>
      ${showEn?`<div class="en">${esc(en)}</div>`:''}
      <div class="meta">${esc(catName(it.cat))} · ${T[lang].metLbl} ${metOf(it)}</div>
    </div>`;}).join('');
  ac.classList.add('open');
  ac.querySelectorAll('.opt').forEach(o=>o.addEventListener('mousedown',e=>{e.preventDefault();choose(+o.dataset.i);}));
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function escAttr(s){return esc(s).replace(/'/g,'&#39;');}
function choose(i){
  picked=acItems[i];
  $('search').value=activityName(picked);
  $('ac').classList.remove('open');
  renderPicked();
  $('add').disabled=false;
}
function renderPicked(){
  if(!picked){$('picked').style.display='none';return;}
  const p=$('picked');p.style.display='flex';
  const nm=activityName(picked), en=activityName(picked,'en');
  const showEn = lang!=='en' && en.toLowerCase()!==nm.toLowerCase();
  p.innerHTML=`<div><div>${esc(nm)}</div>${showEn?`<span class="en">${esc(en)}</span>`:''}</div>
    <span class="met">${T[lang].metLbl} ${metOf(picked)}</span>`;
}

/* ------------- session ------------- */
function addItem(){
  if(!picked)return;
  const dur=parseFloat($('dur').value)||0;
  if(dur<=0)return;
  const kpm=kcalPerMin(picked);
  const kcal=kpm*dur;
  session.push({item:picked, met:metOf(picked), dur, kcal, mode});
  renderItems();
  // gentle reset of activity, keep weight/dur
  picked=null;$('search').value='';renderPicked();$('add').disabled=true;
  $('search').focus();
}
function renderItems(){
  const box=$('items');
  if(!session.length){box.innerHTML=`<p class="empty-s">${T[lang].empty}</p>`;$('totalRow').style.display='none';setDial(0);updateEA();return;}
  box.innerHTML=session.map((s,i)=>{
    const nm=activityName(s.item);
    return `<div class="item">
    <div class="info"><div class="nm" title="${esc(nm)}">${esc(nm)}</div>
      <div class="sub">${T[lang].metLbl} ${s.met} · ${s.dur} min</div></div>
    <span class="kc">${Math.round(s.kcal)} kcal</span>
    <button class="rm" title="${T[lang].remove}" data-i="${i}">×</button></div>`;}).join('');
  box.querySelectorAll('.rm').forEach(b=>b.addEventListener('click',()=>{session.splice(+b.dataset.i,1);renderItems();}));
  const total=session.reduce((a,s)=>a+s.kcal,0);
  $('totalRow').style.display='flex';
  $('totalVal').textContent=Math.round(total)+' kcal';
  setDial(total);
  updateEA();
}
function setDial(total){
  $('kcalBig').textContent=Math.round(total);
  // auto-scale: full ring near a rolling soft-max
  const soft=Math.max(300, Math.ceil(total/100)*100*1.15);
  const frac=Math.min(total/soft,1);
  $('arc').style.strokeDashoffset = 628*(1-frac);
}
function sessionTotal(){
  return session.reduce((a,s)=>a+s.kcal,0);
}
function eaExerciseEnergy(){
  const total=sessionTotal();
  return eaMode==='week'?total/7:total;
}
function eaValues(){
  const intake=parseFloat($('energyIntake').value)||0;
  const ffm=parseFloat($('ffm').value)||0;
  const weekly=sessionTotal();
  const exercise=eaExerciseEnergy();
  const ea=ffm>0?(intake-exercise)/ffm:null;
  return {intake, ffm, exercise, weekly, ea, mode:eaMode};
}
function updateEA(){
  const v=eaValues();
  $('eaResult').textContent=v.ea===null?'—':`${fmt(v.ea)} ${T[lang].eaUnit}`;
}
function safeFileName(name){
  return (name||'aiMET').trim().replace(/[\\/:*?"<>|]+/g,'-').replace(/\s+/g,'_')||'aiMET';
}
function excelCell(value){
  return `<td>${esc(value)}</td>`;
}
function excelRows(rows){
  return rows.map(row=>`<tr>${row.map(excelCell).join('')}</tr>`).join('');
}
function excelHtml(){
  const t=T[lang], v=eaValues();
  const unitLabel=units==='imperial'?t.imperial:t.metric;
  const weightLabel=units==='imperial'?t.weightImperial:t.weightMetric;
  const summary=[
    ['aiMET',''],
    [t.units,unitLabel],
    [weightLabel,$('weight').value],
    [t.eaMode,eaMode==='week'?t.eaWeek:t.eaDay],
    [t.weeklyExercise,Math.round(v.weekly)+' kcal'],
    [t.exerciseEnergy,Math.round(v.exercise)+' kcal'],
    [t.energyIntake,v.intake?`${v.intake} kcal`:'' ],
    [t.ffm,v.ffm?`${v.ffm} kg`:'' ],
    [t.eaResult,v.ea===null?'':`${fmt(v.ea)} ${t.eaUnit}`]
  ];
  const activities=[[t.sheetActivities,'', '', '', '', ''],['Código','Categoria','Atividade',t.metLbl,t.dur,'kcal']];
  session.forEach(s=>activities.push([
    s.item.code,
    catName(s.item.cat),
    activityName(s.item),
    s.met,
    s.dur,
    Math.round(s.kcal)
  ]));
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>
    <table><caption>${esc(t.sheetSummary)}</caption>${excelRows(summary)}</table>
    <br>
    <table><caption>${esc(t.sheetActivities)}</caption>${excelRows(activities)}</table>
  </body></html>`;
}
async function saveExcel(){
  const filename=safeFileName($('fileName').value)+'.xls';
  const blob=new Blob([excelHtml()],{type:'application/vnd.ms-excel;charset=utf-8'});
  if(window.showSaveFilePicker){
    try{
      const handle=await window.showSaveFilePicker({
        suggestedName:filename,
        types:[{description:'Excel',accept:{'application/vnd.ms-excel':['.xls']}}]
      });
      const writable=await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    }catch(e){if(e.name==='AbortError')return;}
  }
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();
  URL.revokeObjectURL(url);
}

/* ------------- events ------------- */
document.querySelectorAll('.lang button').forEach(b=>b.addEventListener('click',()=>{
  lang=b.dataset.lang;
  document.querySelectorAll('.lang button').forEach(x=>x.setAttribute('aria-pressed',x===b));
  // re-localize picked name if still selected
  applyLang(); runSearch();
}));
$('modeSeg').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
  mode=b.dataset.mode;
  $('modeSeg').querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed',x===b));
  $('youthRow').style.display = mode==='youth'?'flex':'none';
  picked=null;$('search').value='';renderPicked();$('add').disabled=true;
  $('ac').classList.remove('open');
  updateBMRhint();
}));
$('unitSeg').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
  const next=b.dataset.units;
  if(next===units)return;
  const current=parseFloat($('weight').value)||0;
  $('weight').value=next==='imperial'?inputFmt(current*2.20462):inputFmt(current/2.20462);
  units=next;
  $('unitSeg').querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed',x===b));
  applyLang();
  runSearch();
}));
$('search').addEventListener('input',runSearch);
$('search').addEventListener('focus',runSearch);
$('search').addEventListener('keydown',e=>{
  const ac=$('ac');if(!ac.classList.contains('open'))return;
  const opts=ac.querySelectorAll('.opt');if(!opts.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();hi=Math.min(hi+1,opts.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();hi=Math.max(hi-1,0);}
  else if(e.key==='Enter'){e.preventDefault();if(hi>=0)choose(hi);return;}
  else if(e.key==='Escape'){ac.classList.remove('open');return;}
  opts.forEach((o,i)=>o.classList.toggle('hi',i===hi));
  if(hi>=0)opts[hi].scrollIntoView({block:'nearest'});
});
document.addEventListener('click',e=>{if(!e.target.closest('.field'))$('ac').classList.remove('open');});
$('add').addEventListener('click',addItem);
['weight','sex','band'].forEach(id=>$(id).addEventListener('input',updateBMRhint));
$('eaToggle').addEventListener('click',()=>{
  const open=!$('eaPanel').classList.contains('open');
  $('eaPanel').classList.toggle('open',open);
  $('eaToggle').setAttribute('aria-expanded',open);
});
$('eaModeSeg').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
  eaMode=b.dataset.eaMode;
  $('eaModeSeg').querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed',x===b));
  updateEA();
}));
['energyIntake','ffm'].forEach(id=>$(id).addEventListener('input',updateEA));
$('saveExcel').addEventListener('click',saveExcel);

/* init */
applyLang();
</script>
</body>
</html>
